<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>The £5 Pint Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>The £5 Pint Clock</h1>
    
    <div class="countdown">
      <div class="segment">
        <div class="value" id="years">00</div>
        <div class="label">Years</div>
      </div>
      <div class="segment">
        <div class="value" id="months">00</div>
        <div class="label">Months</div>
      </div>
      <div class="segment">
        <div class="value" id="days">00</div>
        <div class="label">Days</div>
      </div>
      <div class="segment">
        <div class="value" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="segment">
        <div class="value" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="segment">
        <div class="value" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>
    
    <div class="info">Until the UK average pint reaches £5.00</div>
    
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Current</div>
        <div class="metric-value" id="current">£4.83</div>
      </div>
      <div class="metric">
        <div class="metric-label">Target</div>
        <div class="metric-value">£5.00</div>
      </div>
      <div class="metric">
        <div class="metric-label">Progress</div>
        <div class="metric-value" id="progress">96.6%</div>
      </div>
    </div>
    
    <div class="footer">
      Data: ONS Average Price of Draught Lager (CZMS) · <span id="updated">2025 JAN</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
